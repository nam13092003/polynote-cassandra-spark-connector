services:
  cassandra-node:
    image: cassandra:4.1
    container_name: cassandra-node
    ports:
      - "9042:9042"
    environment:
      - CASSANDRA_CLUSTER_NAME=TestCluster
    networks:
      - spark-network

  spark:
    image: docker.io/bitnamilegacy/spark:3.5.1
    container_name: spark-master
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
      - SPARK_USER=spark
    ports:
      - '8080:8080'
      - '7077:7077'
    networks:
      - spark-network
    depends_on:
      - cassandra-node

  spark-worker:
    image: docker.io/bitnamilegacy/spark:3.5.1
    container_name: spark-worker
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=1G
      - SPARK_WORKER_CORES=1
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
      - SPARK_USER=spark
    networks:
      - spark-network
    depends_on:
      - spark

  polynote:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        POLYNOTE_VERSION: ${POLYNOTE_VERSION:-0.5.0}
        SCALA_VERSION: ${SCALA_VERSION:-2.12}
    container_name: polynote
    image: polynote-spark3
    ports:
      - "8192:8192"
      - "4040-4050:4040-4050"
    volumes:
      - ./config.yml:/opt/config/config.yml
      - ./notebooks:/opt/notebooks
    command: ["--config", "/opt/config/config.yml"]
    stdin_open: true
    tty: true
    networks:
      - spark-network
    depends_on:
      - spark
      - cassandra-node

networks:
  spark-network:
    driver: bridge